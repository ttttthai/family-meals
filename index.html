<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bữa Cơm Gia Đình — Family Meals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root {
  --primary: #E8521A;
  --primary-light: #FF7A45;
  --secondary: #2D5016;
  --secondary-light: #4A7A2E;
  --bg: #FFF9F4;
  --card: #FFFFFF;
  --text: #1A1A1A;
  --muted: #8B7355;
  --border: #F0E6D9;
  --shadow: 0 4px 20px rgba(232,82,26,0.08);
  --shadow-lg: 0 8px 40px rgba(232,82,26,0.12);
  --radius: 16px;
  --radius-lg: 24px;
  --font-ui: 'Nunito', sans-serif;
  --font-display: 'Playfair Display', serif;
  --nav-height: 72px;
  --amber: #F59E0B;
  --green: #22C55E;
  --red: #EF4444;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1A1208;
    --card: #2A1F10;
    --text: #F5ECD7;
    --muted: #A89478;
    --border: #3D2E1A;
    --shadow: 0 4px 20px rgba(0,0,0,0.3);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
  }
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  font-family: var(--font-ui); background: var(--bg); color: var(--text);
  min-height:100vh; overflow-x:hidden;
}
body { padding-bottom: calc(var(--nav-height) + 16px); }

/* ═══ BOTTOM NAV ═══ */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:1000;
  background: var(--card); border-top:1px solid var(--border);
  display:flex; height:var(--nav-height);
  box-shadow: 0 -2px 20px rgba(0,0,0,0.06);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; cursor:pointer; transition:all .2s; border:none; background:none;
  color:var(--muted); font-family:var(--font-ui); font-size:10px;
}
.nav-item.active { color:var(--primary); }
.nav-item .nav-icon { font-size:22px; }
.nav-item .nav-label { font-weight:600; }
.nav-item .nav-sub { font-size:8px; opacity:.7; }

/* ═══ HEADER ═══ */
.app-header {
  background: linear-gradient(135deg, var(--primary), #D4451A);
  color:#fff; padding:16px 16px 12px; position:sticky; top:0; z-index:100;
  display:flex; align-items:center; gap:12px;
}
.app-title { font-family:var(--font-display); font-size:20px; font-weight:700; }
.app-subtitle { font-size:11px; opacity:.85; }

/* ═══ MEMBER SELECTOR ═══ */
.member-selector {
  display:flex; gap:8px; padding:12px 16px; background:var(--card);
  border-bottom:1px solid var(--border); overflow-x:auto;
  position:sticky; top:60px; z-index:99;
}
.member-selector::-webkit-scrollbar { display:none; }
.member-box {
  display:flex; align-items:center; gap:6px; padding:8px 14px;
  border-radius:12px; border:2px solid var(--border); background:var(--bg);
  cursor:pointer; transition:all .2s; white-space:nowrap; min-height:44px;
  user-select:none;
}
.member-box.active {
  border-color:var(--primary); background:rgba(232,82,26,0.08);
}
.member-box .mb-icon { font-size:20px; }
.member-box .mb-name { font-size:12px; font-weight:700; color:var(--text); }
.member-box .mb-sub { font-size:10px; color:var(--muted); }
.member-box .mb-check {
  width:18px; height:18px; border-radius:4px; border:2px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:12px;
  transition:all .2s;
}
.member-box.active .mb-check {
  background:var(--primary); border-color:var(--primary); color:#fff;
}
.member-count {
  font-size:11px; color:var(--muted); padding:0 16px 8px;
  background:var(--card); border-bottom:1px solid var(--border);
}

/* ═══ VIEWS ═══ */
.view { display:none; padding:16px; animation: fadeIn .3s ease; }
.view.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes scaleBounce { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

/* ═══ WEEK GRID ═══ */
.week-scroll {
  display:flex; gap:12px; overflow-x:auto; padding:4px 0 16px;
  scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
}
.week-scroll::-webkit-scrollbar { display:none; }
.day-card {
  min-width:170px; flex-shrink:0; background:var(--card); border-radius:var(--radius);
  overflow:hidden; box-shadow:var(--shadow); scroll-snap-align:start;
  border:2px solid transparent; transition:all .3s; cursor:pointer;
}
.day-card.today { border-color:var(--primary); }
.day-card-header {
  position:relative; height:80px; background:linear-gradient(135deg,var(--primary),var(--primary-light));
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.day-card-header img {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:.35;
}
.day-card-header .day-overlay {
  position:relative; z-index:1; text-align:center; color:#fff;
}
.day-card-header .day-overlay .day-name { font-weight:800; font-size:15px; }
.day-card-header .day-overlay .day-name-en { font-size:10px; opacity:.85; }
.day-card-header .day-overlay .day-date {
  font-size:22px; font-weight:800; font-family:var(--font-display);
}
.day-card-body { padding:10px; }
.day-card .day-icons { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:6px; font-size:13px; }
.meal-slot {
  display:flex; align-items:center; gap:6px; padding:6px 8px; margin:3px 0;
  background:var(--bg); border-radius:10px; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .2s; min-height:44px;
}
.meal-slot:hover { background:var(--border); transform:scale(1.02); }
.meal-slot.locked { border:2px solid var(--green); background:rgba(34,197,94,.06); }
.meal-slot .slot-icon { font-size:16px; }
.meal-slot .slot-info { flex:1; }
.meal-slot .slot-name { font-size:10px; color:var(--muted); }
.meal-slot .slot-dish { font-size:11px; font-weight:700; color:var(--secondary); }
.meal-slot .slot-thumb { width:36px; height:36px; border-radius:8px; object-fit:cover; }
.portion-badge {
  background:var(--amber); color:#fff; font-size:9px; font-weight:700;
  padding:2px 6px; border-radius:8px; white-space:nowrap;
}

/* ═══ TOGGLES ═══ */
.toggle-row {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:var(--card); border-radius:12px; margin:6px 0; box-shadow:var(--shadow);
}
.toggle-row label { flex:1; font-size:13px; font-weight:600; }
.toggle-switch {
  width:44px; height:26px; background:var(--border); border-radius:13px;
  position:relative; cursor:pointer; transition:background .3s; border:none;
}
.toggle-switch.on { background:var(--primary); }
.toggle-switch::after {
  content:''; position:absolute; top:3px; left:3px; width:20px; height:20px;
  background:#fff; border-radius:50%; transition:transform .3s;
}
.toggle-switch.on::after { transform:translateX(18px); }

/* ═══ FOOD CARDS ═══ */
.food-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(min-width:600px){ .food-grid { grid-template-columns:1fr 1fr 1fr; } }
.food-card {
  background:var(--card); border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow); transition:all .3s; cursor:pointer;
  animation:slideUp .4s ease backwards; position:relative;
}
.food-card:hover { transform:translateY(-4px); box-shadow:var(--shadow-lg); }
.food-card.greyed { opacity:.5; filter:grayscale(.5); }
.food-card.repeat-warn { border:2px solid var(--amber); }
.food-card-img-wrap {
  position:relative; overflow:hidden;
}
.food-card-img {
  width:100%; height:150px; object-fit:cover; background:#E8DDD0;
  transition:transform .4s;
}
.food-card:hover .food-card-img { transform:scale(1.05); }
.food-card-overlay {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(transparent, rgba(0,0,0,.7));
  padding:24px 10px 8px; color:#fff;
}
.food-card-overlay .cuisine-tag { margin:0 0 4px; }
.food-card-overlay .compat-overall {
  position:absolute; top:8px; right:8px;
}
.food-card-body { padding:10px; }
.food-card-name { font-family:var(--font-display); font-size:14px; font-weight:700; line-height:1.2; }
.food-card-name-en { font-size:11px; color:var(--muted); margin-top:2px; }
.cuisine-tag {
  display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px;
  font-weight:700; margin:6px 4px 6px 0;
}
.cuisine-filter {
  display:flex; gap:8px; overflow-x:auto; padding:4px 0;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.cuisine-filter::-webkit-scrollbar { display:none; }
.filter-row {
  display:flex; align-items:center; gap:8px; margin-bottom:4px;
}
.filter-label {
  font-size:11px; font-weight:700; color:var(--muted); white-space:nowrap; min-width:70px;
}
.cuisine-pill {
  flex-shrink:0; padding:6px 14px; border-radius:24px; font-size:12px;
  font-weight:600; border:2px solid var(--border); background:var(--card);
  cursor:pointer; transition:all .2s; white-space:nowrap;
}
.cuisine-pill.active {
  background:var(--primary); color:#fff; border-color:var(--primary);
  box-shadow:0 2px 8px rgba(232,82,26,.3);
}
.cuisine-pill.type-pill.active {
  background:var(--secondary); border-color:var(--secondary);
  box-shadow:0 2px 8px rgba(45,80,22,.3);
}
.cuisine-pill:not(.active):hover { border-color:var(--primary); color:var(--primary); }
.group-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
}
@media(min-width:600px) { .group-grid { grid-template-columns:1fr 1fr 1fr; } }
.group-card {
  background:var(--card); border-radius:16px; overflow:hidden;
  box-shadow:var(--shadow); cursor:pointer; transition:transform .2s, box-shadow .2s;
  animation:fadeIn .3s ease;
}
.group-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.12); }
.group-card:active { transform:scale(.97); }
.group-card-img { position:relative; height:120px; overflow:hidden; }
.group-card-img img { width:100%; height:100%; object-fit:cover; }
.group-card-overlay {
  position:absolute; bottom:0; left:0; right:0; padding:6px 10px;
  display:flex; justify-content:space-between; align-items:center;
  background:linear-gradient(transparent, rgba(0,0,0,.6));
}
.group-card-count { color:#fff; font-size:12px; font-weight:700; }
.group-card-body { padding:10px; }
.group-card-name { font-family:var(--font-display); font-size:14px; font-weight:700; }
.group-card-preview { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.3;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.group-header {
  display:flex; align-items:center; gap:12px; padding:8px 0 12px; cursor:pointer;
}
.group-back { font-size:14px; color:var(--primary); font-weight:600; }
.group-title { font-family:var(--font-display); font-size:18px; font-weight:700; }
.compat-bar { display:flex; gap:6px; margin:8px 0; align-items:center; }
.compat-member { display:flex; flex-direction:column; align-items:center; font-size:10px; gap:2px; }
.compat-member .member-icon { font-size:18px; }
.compat-overall {
  font-size:13px; font-weight:700; padding:3px 10px; border-radius:10px;
}
.compat-high { background:#DCFCE7; color:#166534; }
.compat-med { background:#FEF9C3; color:#854D0E; }
.compat-low { background:#FEE2E2; color:#991B1B; }
@media(prefers-color-scheme:dark){
  .compat-high{background:#14532D;color:#86EFAC;}
  .compat-med{background:#713F12;color:#FDE68A;}
  .compat-low{background:#7F1D1D;color:#FCA5A5;}
}
.food-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
.chip {
  padding:3px 8px; border-radius:8px; font-size:10px; font-weight:600;
  background:var(--bg); color:var(--muted);
}
.conflict-badge {
  display:block; font-size:11px; color:var(--red); font-weight:600;
  margin-top:6px; padding:4px 8px; background:#FEF2F2; border-radius:8px;
}
@media(prefers-color-scheme:dark){.conflict-badge{background:#450A0A;color:#FCA5A5;}}
.repeat-badge {
  display:inline-block; font-size:11px; color:var(--amber); font-weight:600;
  margin-top:4px;
}
.happy-badge { font-size:12px; font-weight:700; color:var(--secondary); margin-top:6px; }

/* ═══ MODAL ═══ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:2000;
  display:none; align-items:flex-end; justify-content:center;
  backdrop-filter:blur(4px);
}
.modal-overlay.open { display:flex; }
.modal-sheet {
  background:var(--card); border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  width:100%; max-width:500px; max-height:85vh; overflow-y:auto;
  animation:slideUp .3s ease; padding:0 0 env(safe-area-inset-bottom);
}
.modal-handle {
  width:40px; height:4px; background:var(--border); border-radius:2px;
  margin:10px auto;
}
.modal-header { padding:0 16px 12px; }
.modal-header h2 { font-family:var(--font-display); font-size:20px; }
.modal-header p { font-size:13px; color:var(--muted); }
.modal-body { padding:0 16px 24px; }
.modal-close {
  position:absolute; top:16px; right:16px; width:36px; height:36px;
  border-radius:50%; border:none; background:var(--bg); font-size:18px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.modal-img { width:100%; height:200px; object-fit:cover; }
.detail-section { margin:16px 0; }
.detail-section h3 { font-size:14px; font-weight:700; margin-bottom:8px; }
.detail-section p { font-size:13px; line-height:1.6; color:var(--muted); }
.ingredient-list { display:flex; flex-wrap:wrap; gap:6px; }
.ingredient-item {
  padding:4px 10px; background:var(--bg); border-radius:8px;
  font-size:12px; color:var(--text);
}
.member-breakdown {
  display:grid; gap:8px;
}
.member-row {
  display:flex; align-items:center; gap:10px; padding:8px 10px;
  background:var(--bg); border-radius:10px;
}
.member-row .m-icon { font-size:24px; }
.member-row .m-info { flex:1; }
.member-row .m-name { font-weight:700; font-size:13px; }
.member-row .m-reason { font-size:11px; color:var(--muted); }
.member-row .m-vote { font-size:20px; }

/* ═══ VOTING ═══ */
.voting-panel {
  background:var(--card); border-radius:var(--radius); padding:14px;
  box-shadow:var(--shadow); margin-bottom:16px;
}
.voting-title { font-weight:700; font-size:15px; margin-bottom:10px; }
.voter-avatars { display:flex; gap:12px; margin-bottom:12px; justify-content:center; }
.voter-avatar {
  width:52px; height:52px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:26px; background:var(--bg); border:3px solid var(--border);
  cursor:pointer; transition:all .2s; position:relative;
}
.voter-avatar.active { border-color:var(--primary); box-shadow:0 0 0 3px rgba(232,82,26,.2); }
.voter-avatar .vote-indicator {
  position:absolute; bottom:-4px; right:-4px; font-size:14px;
  background:var(--card); border-radius:50%; width:22px; height:22px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.15);
}
.vote-btns { display:flex; gap:8px; justify-content:center; margin:10px 0; }
.vote-btn {
  min-width:44px; min-height:44px; border-radius:12px; border:2px solid var(--border);
  background:var(--card); font-size:20px; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; padding:8px 14px;
}
.vote-btn:hover { border-color:var(--primary); }
.vote-btn.selected { border-color:var(--primary); background:rgba(232,82,26,.08); transform:scale(1.1); }
.consensus-bar {
  height:8px; background:var(--border); border-radius:4px; overflow:hidden; margin:10px 0;
}
.consensus-fill {
  height:100%; background:linear-gradient(90deg,var(--primary),var(--green));
  border-radius:4px; transition:width .5s ease;
}
.consensus-text { font-size:12px; color:var(--muted); text-align:center; }
.lock-btn {
  width:100%; padding:14px; border:none; border-radius:12px;
  background:var(--primary); color:#fff; font-family:var(--font-ui);
  font-size:15px; font-weight:700; cursor:pointer; margin-top:10px;
  min-height:48px; transition:all .2s;
}
.lock-btn:disabled { opacity:.4; cursor:not-allowed; }
.lock-btn:not(:disabled):hover { background:var(--primary-light); }

/* ═══ SEARCH ═══ */
.search-bar {
  display:flex; align-items:center; gap:8px; background:var(--card);
  border-radius:14px; padding:10px 14px; box-shadow:var(--shadow); margin-bottom:12px;
}
.search-bar input {
  flex:1; border:none; background:transparent; font-family:var(--font-ui);
  font-size:14px; color:var(--text); outline:none;
}
.search-bar input::placeholder { color:var(--muted); }
.filter-scroll { display:flex; gap:8px; overflow-x:auto; padding:4px 0 12px; }
.filter-scroll::-webkit-scrollbar { display:none; }
.filter-chip {
  white-space:nowrap; padding:8px 14px; border-radius:20px; font-size:12px;
  font-weight:600; background:var(--card); border:1px solid var(--border);
  cursor:pointer; transition:all .2s; min-height:36px;
}
.filter-chip.active { background:var(--primary); color:#fff; border-color:var(--primary); }
.restaurant-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
@media(max-width:400px){ .restaurant-grid { grid-template-columns:1fr; } }
.rest-card {
  background:var(--card); border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow); cursor:pointer; transition:all .3s;
  animation:slideUp .4s ease backwards; position:relative;
}
.rest-card:hover { transform:translateY(-3px); box-shadow:var(--shadow-lg); }
.rest-card-img-wrap { position:relative; overflow:hidden; }
.rest-card-img { width:100%; height:140px; object-fit:cover; background:#E8DDD0; transition:transform .4s; }
.rest-card:hover .rest-card-img { transform:scale(1.05); }
.rest-card-rating-badge {
  position:absolute; top:8px; left:8px; background:rgba(0,0,0,.7); color:#fff;
  padding:3px 8px; border-radius:8px; font-size:11px; font-weight:700;
  backdrop-filter:blur(4px);
}
.rest-card-body { padding:10px; }
.rest-card-name { font-weight:700; font-size:13px; }
.rest-card-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.rest-card-rating { color:var(--amber); font-weight:700; }

/* ═══ HISTORY ═══ */
.history-week { margin-bottom:20px; }
.history-week h3 { font-size:14px; font-weight:700; color:var(--primary); margin-bottom:8px; }
.history-item {
  display:flex; align-items:center; gap:10px; padding:10px;
  background:var(--card); border-radius:12px; margin-bottom:8px; box-shadow:var(--shadow);
}
.history-item img { width:64px; height:64px; border-radius:12px; object-fit:cover; }
.history-info { flex:1; }
.history-info .h-dish { font-weight:700; font-size:13px; }
.history-info .h-meta { font-size:11px; color:var(--muted); }

/* ═══ CUISINE COLORS ═══ */
.cuisine-vietnamese { background:#E8F5E9; color:#2D5016; }
.cuisine-japanese { background:#FFF3E0; color:#E65100; }
.cuisine-korean { background:#FCE4EC; color:#880E4F; }
.cuisine-italian { background:#E3F2FD; color:#1565C0; }
.cuisine-french { background:#F3E5F5; color:#6A1B9A; }
.cuisine-indian { background:#FFF8E1; color:#F57F17; }
.cuisine-mexican { background:#EFEBE9; color:#4E342E; }
.cuisine-chinese { background:#FFEBEE; color:#C62828; }
.cuisine-thai { background:#E0F7FA; color:#00695C; }
.cuisine-street { background:#FBE9E7; color:#BF360C; }
.cuisine-western { background:#ECEFF1; color:#37474F; }
@media(prefers-color-scheme:dark){
  .cuisine-vietnamese{background:#1B3A1B;} .cuisine-japanese{background:#3E2400;}
  .cuisine-korean{background:#3E0A1F;} .cuisine-italian{background:#0A2540;}
  .cuisine-french{background:#2A0A3E;} .cuisine-indian{background:#3E3000;}
  .cuisine-mexican{background:#2E1A0A;} .cuisine-chinese{background:#3E0A0A;}
  .cuisine-thai{background:#0A2E2E;} .cuisine-street{background:#3E1A0A;}
  .cuisine-western{background:#1A2030;}
}

/* ═══ TODAY VIEW HEADER ═══ */
.today-hero {
  position:relative; border-radius:var(--radius); overflow:hidden;
  height:140px; margin-bottom:16px;
}
.today-hero img {
  width:100%; height:100%; object-fit:cover;
}
.today-hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(232,82,26,.85), rgba(45,80,22,.7));
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  color:#fff; text-align:center; padding:16px;
}
.today-hero h2 { font-family:var(--font-display); font-size:24px; text-shadow:0 2px 8px rgba(0,0,0,.2); }
.today-hero p { font-size:13px; opacity:.9; margin-top:4px; }
.meal-tabs { display:flex; gap:8px; margin-bottom:16px; }
.meal-tab {
  flex:1; padding:10px; border-radius:12px; border:2px solid var(--border);
  background:var(--card); text-align:center; cursor:pointer; font-weight:600;
  font-size:13px; transition:all .2s; font-family:var(--font-ui); min-height:44px;
  position:relative; overflow:hidden;
}
.meal-tab.active { border-color:var(--primary); background:rgba(232,82,26,.06); color:var(--primary); }
.meal-tab .tab-icon { font-size:20px; display:block; }

.section-title {
  font-family:var(--font-display); font-size:17px; margin:16px 0 10px;
}

/* ═══ EMPTY STATE ═══ */
.empty-state {
  text-align:center; padding:40px 20px; color:var(--muted);
}
.empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ═══ BTN ═══ */
.btn-primary {
  padding:12px 20px; border:none; border-radius:12px; background:var(--primary);
  color:#fff; font-family:var(--font-ui); font-size:14px; font-weight:700;
  cursor:pointer; min-height:44px; transition:all .2s;
}
.btn-primary:hover { background:var(--primary-light); }
.btn-outline {
  padding:10px 16px; border:2px solid var(--primary); border-radius:12px;
  background:transparent; color:var(--primary); font-family:var(--font-ui);
  font-size:13px; font-weight:700; cursor:pointer; min-height:44px;
}
</style>
</head>

</div>

</div>

<!-- ═══ VIEW: HISTORY ═══ -->

</div>

<!-- ═══ MODAL ═══ -->
<div id="modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet" id="modal-content"></div>
</div>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="switchView('schedule')">

</nav>

function loadState() {
  try {
    const saved = localStorage.getItem('familyMeals');
    if (saved) {
      const s = JSON.parse(saved);
      Object.assign(state, s);
      // Ensure activeMembers exists for older saved states
      if (!state.activeMembers) {
        state.activeMembers = { dad:true, mom:true, son:true, daughter:true, grandparents:false };
      }
    }
  } catch(e) {}
}
function saveState() {
  try { localStorage.setItem('familyMeals', JSON.stringify(state)); } catch(e) {}
}

// ═══════════════════════════════════════
function getWeekDates() {
  const today = new Date();
  const day = today.getDay();
  const mon = new Date(today);
  mon.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    dates.push(d);
  }
  return dates;
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function isWeekend(d) { return d.getDay()===0 || d.getDay()===6; }

function getMealMembers(date, meal) {
  const dk = dateKey(date);
  const weekend = isWeekend(date);
  const holiday = state.schoolHoliday[dk];
  let members = [];

  if (meal === 'breakfast') {
    members.push('dad','mom');
    if (weekend || holiday) members.push('son','daughter');
  } else if (meal === 'lunch') {
    if (weekend || holiday) {
      members.push('dad','mom','son','daughter');
    } else {
      // Weekday lunch: dad+mom, unless special lunch excludes one
      const sp = state.specialLunch[dk] || {};
      if (!sp.dad) members.push('dad');
      if (!sp.mom) members.push('mom');
    }
  } else { // dinner
    members.push('dad','mom','son','daughter');
  }
  // Filter by active member selector
  members = members.filter(m => state.activeMembers[m]);
  return members;
}

function getPortionCount() {
  let count = ['dad','mom','son','daughter'].filter(m => state.activeMembers[m]).length;
  if (state.activeMembers.grandparents) count += 2;
  return count;
}

function toggleMemberSelector(id) {
  state.activeMembers[id] = !state.activeMembers[id];
  // Grandparents toggle also syncs with per-day grandparent state
  if (id === 'grandparents') {
    const date = state.selectedDate ? new Date(state.selectedDate) : new Date();
    const dk = dateKey(date);
    state.grandparents[dk] = state.activeMembers.grandparents;
  }
  saveState();
  renderMemberSelector();
  // Re-render active view
  if (state.currentView === 'schedule') renderWeekGrid();
  else if (state.currentView === 'today') renderTodayView();
  else if (state.currentView === 'search') renderSearch();
}

}

function getMealSlots(date) {
  const dk = dateKey(date);
  const weekend = isWeekend(date);
  const holiday = state.schoolHoliday[dk];
  const slots = [];

  if (weekend || holiday) {
    slots.push('breakfast','lunch','dinner');
  } else {
    // Weekday: breakfast for parents, lunch for parents, dinner for all
    slots.push('breakfast','lunch','dinner');
  }
  return slots;
}

function dishImage(dish) {
  const hash = Math.abs(dish.id.split('').reduce((a,c) => ((a << 5) - a) + c.charCodeAt(0), 0));
  const name = (dish.nameVi + ' ' + dish.nameEn + ' ' + dish.id).toLowerCase();
  const tags = dish.tags || [];

  // Match dish content to best foodish category
  // Valid: rice, pasta, pizza, burger, biryani, dosa, samosa, dessert
  let cat = null;
  if (name.match(/pizza/)) cat = 'pizza';
  else if (name.match(/pasta|spaghetti|fettuccine|lasagna|carbonara|bolognese|penne/)) cat = 'pasta';
  else if (name.match(/burger|hamburger/)) cat = 'burger';
  else if (name.match(/biryani|cà ri|curry|masala|tikka|tandoori|enchilada/)) cat = 'biryani';
  else if (name.match(/tiramisu|fondant|chocolate|mousse|crème|tart|pudding|cheesecake|dessert|kem |ice cream|panna cotta|chè |flan|churros/)) cat = 'dessert';
  else if (name.match(/samosa|nem rán|chả giò|spring roll|tempura|croquette|bánh rán|nem chua|gỏi cuốn/)) cat = 'samosa';
  else if (name.match(/taco|burrito|wrap|quesadilla|nachos|dosa|bánh xèo|bánh cuốn|bánh căn|bánh bèo|bánh khọt|bánh cống|crêpe|pancake|waffle|bánh tôm|bánh giò|quiche/)) cat = 'dosa';
  else if (name.match(/phở|bún|mì |miến|mì quảng|cao lầu|hủ tiếu|bánh canh|bánh đa|noodle|udon|ramen|soba|pad thai|khao soi|vermicelli/)) cat = 'pasta';
  else if (name.match(/cơm|rice|risotto|xôi|omurice|donburi|gyudon|bibimbap/)) cat = 'rice';
  else if (name.match(/steak|bò bít tết|sandwich|bánh mì/)) cat = 'burger';
  else if (name.match(/sushi|sashimi/)) cat = 'rice';
  else if (name.match(/salad|gỏi/)) cat = 'rice';
  else if (name.match(/soup|súp|canh|cháo|lẩu|hotpot|chowder/)) cat = 'biryani';
  else if (name.match(/chiên|rán|fried|katsu|nugget|chicken/)) cat = 'samosa';
  else if (name.match(/nướng|grilled|roast|gà |thịt |bò |cá |tôm |fish|beef|pork|lamb|duck/)) cat = 'biryani';
  else if (name.match(/fondue|phô mai|cheese/)) cat = 'pasta';
  else if (tags.includes('pizza')) cat = 'pizza';

  // Fallback: match by cuisine
  if (!cat) {
    const cuisineMap = {
      vietnamese:'rice', japanese:'rice', korean:'biryani', italian:'pasta',
      french:'dessert', indian:'biryani', mexican:'dosa', chinese:'rice',
      thai:'biryani', street:'samosa', western:'burger'
    };
    cat = cuisineMap[dish.cuisine] || 'rice';
  }

  const imgNum = (hash % 15) + 1;
  return `https://foodish-api.com/images/${cat}/${cat}${imgNum}.jpg`;
}

function restImage(r) {
  const hash = Math.abs(r.name.split('').reduce((a,c) => ((a << 5) - a) + c.charCodeAt(0), 0));
  const cuisineMap = {
    vietnamese:'rice', japanese:'rice', korean:'biryani', italian:'pizza',
    french:'dessert', indian:'biryani', mexican:'burger', chinese:'rice',

  const cat = cuisineMap[r.cuisine] || 'rice';

  return `https://foodish-api.com/images/${cat}/${cat}${imgNum}.jpg`;
}

// ═══════════════════════════════════════
// COMPATIBILITY ENGINE
// ═══════════════════════════════════════
function calculateCompatibility(dish, memberIds) {
  const results = {};
  let totalScore = 0;

  memberIds.forEach(mid => {
    const taste = DATA.tastes[mid];
    if (!taste) { results[mid] = { score:0, status:'soso', reasons:[] }; return; }

    let score = 0;
    const reasons = [];

    // Cuisine score
    const cs = taste.cuisines[dish.cuisine];
    if (cs !== undefined) {
      score += cs;
      if (cs === 2) reasons.push(`Thích ${DATA.cuisineLabels[dish.cuisine]}`);
      else if (cs === -2) reasons.push(`Không thích ${DATA.cuisineLabels[dish.cuisine]}`);
    }

    // Tag scores
    if (dish.tags && taste.tags) {
      dish.tags.forEach(tag => {
        const ts = taste.tags[tag];
        if (ts !== undefined) {
          score += ts;
          const tagName = tag.replace(/_/g,' ');
          if (ts === 2) reasons.push(`Thích ${tagName}`);
          else if (ts === -2) reasons.push(`Không thích ${tagName}`);
        }
      });
    }

    // Normalize to 0-100
    const maxPossible = 2 + (dish.tags ? dish.tags.length * 2 : 0);
    const minPossible = -2 + (dish.tags ? dish.tags.length * -2 : 0);
    const range = maxPossible - minPossible || 1;
    const pct = Math.round(((score - minPossible) / range) * 100);

    let status = 'like';
    if (pct < 40) status = 'dislike';
    else if (pct < 65) status = 'soso';

    results[mid] = { score, pct, status, reasons };
    totalScore += pct;
  });

  const avgPct = Math.round(totalScore / memberIds.length);
  return { members: results, avgPct };
}

function getConflicts(dish, compat, memberIds) {
  const conflicts = [];
  memberIds.forEach(mid => {
    const m = compat.members[mid];
    if (m && m.status === 'dislike') {
      const name = DATA.members[mid]?.name || mid;
      const reason = m.reasons.filter(r => r.startsWith('Không')).join(', ');
      conflicts.push({ member: name, reason });
    }
  });
  // Spicy check
  if (dish.tags && dish.tags.includes('spicy') && dish.spice >= 2) {
    const spicyHaters = memberIds.filter(mid => {
      const t = DATA.tastes[mid];
      return t && t.tags && t.tags.spicy === -2;
    }).map(mid => DATA.members[mid]?.name);
    if (spicyHaters.length > 0) {
      conflicts.push({ member: spicyHaters.join(' & '), reason: `🌶️ Cay — ${spicyHaters.join(' & ')} không ăn cay` });
    }
  }
  return conflicts;
}

function getRepeatInfo(dishId) {
  const now = Date.now();
  const fiveDays = 5 * 24 * 60 * 60 * 1000;
  const recent = state.mealHistory.find(h => h.dishId === dishId && (now - h.timestamp) < 30*24*60*60*1000);
  if (!recent) return null;
  const daysAgo = Math.round((now - recent.timestamp) / (24*60*60*1000));
  const isRecent = (now - recent.timestamp) < fiveDays;
  return { daysAgo, isRecent };
}

// RENDER: WEEK SCHEDULE

function renderWeekGrid() {
  const dates = getWeekDates();
  const grid = document.getElementById('week-grid');

  grid.innerHTML = dates.map((d, i) => {
    const dk = dateKey(d);
    const today = isToday(d);
    const weekend = isWeekend(d);
    const holiday = state.schoolHoliday[dk];
    const gp = state.grandparents[dk];
    const slots = getMealSlots(d);

    let icons = '';
    if (gp) icons += '👴👵 ';
    if (!weekend && !holiday) icons += '🏫 ';
    if (!weekend && !holiday) icons += '❤️ ';

    const slotsHtml = slots.map(sl => {
      const key = `${dk}_${sl}`;
      const locked = state.lockedMeals[key];
      const dish = locked ? DATA.dishes.find(dd => dd.id === locked) : null;
      const members = getMealMembers(d, sl);
      const slotIcon = sl==='breakfast'?'🌅':sl==='lunch'?'☀️':'🌙';
      const slotName = sl==='breakfast'?'Sáng':sl==='lunch'?'Trưa':'Tối';
      const slotNameEn = sl==='breakfast'?'Breakfast':sl==='lunch'?'Lunch':'Dinner';

      let extra = '';
      if (state.activeMembers.grandparents && sl === 'dinner') extra = `<span class="portion-badge">+2 Ông Bà</span>`;

      return `<div class="meal-slot ${locked?'locked':''}" onclick="openMealSlot('${dk}','${sl}',${d.getTime()})">
        <span class="slot-icon">${slotIcon}</span>
        <div class="slot-info">
          <div class="slot-name">${slotName} / ${slotNameEn}</div>
          ${dish ? `<div class="slot-dish">${dish.nameVi}</div>` : ''}
        </div>
        ${dish ? `<img class="slot-thumb" src="${dishImage(dish)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        ${extra}
      </div>`;
    }).join('');

    const dayVi = DATA.dayNamesVi[d.getDay()];
    const dayEn = DATA.dayNamesEn[d.getDay()];
    // Pick a random food image per day based on day index
    const dayFoodCats = ['rice','pizza','pasta','biryani','dessert','burger','dosa'];
    const dayImg = `https://foodish-api.com/images/${dayFoodCats[i]}/${dayFoodCats[i]}${i+1}.jpg`;

    return `<div class="day-card ${today?'today':''}" style="animation-delay:${i*50}ms">
      <div class="day-card-header">
        <img src="${dayImg}" alt="" loading="lazy" onerror="this.style.display='none'">
        <div class="day-overlay">
          <div class="day-name">${dayVi}</div>
          <div class="day-name-en">${dayEn}</div>
          <div class="day-date">${d.getDate()}/${d.getMonth()+1}</div>
        </div>
      </div>
      <div class="day-card-body">
        <div class="day-icons">${icons}</div>
        ${slotsHtml}
      </div>
    </div>`;
  }).join('');

  // Scroll to today
  setTimeout(() => {
    const todayCard = grid.querySelector('.today');
    if (todayCard) todayCard.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  }, 100);

}

  }).join('');

  // Members for this meal
  const members = getMealMembers(date, meal);

  // Voting section
  renderVoting(dk, meal, members);

  // Food suggestions
  renderFoodSuggestions(dk, meal, members);
}

function selectMealTab(meal) {
  state.selectedMeal = meal;
  state.activeMember = null;
  saveState();
  renderTodayView();
}

// RENDER: VOTING
// ═══════════════════════════════════════
function renderVoting(dk, meal, members) {
  const key = `${dk}_${meal}`;
  const locked = state.lockedMeals[key];

  if (locked) {
    const dish = DATA.dishes.find(d => d.id === locked);
    document.getElementById('voting-section').innerHTML = `
      <div class="voting-panel" style="text-align:center">
        <div style="font-size:32px;margin-bottom:8px">🎉</div>
        <div class="voting-title">Đã chọn: ${dish?.nameVi || locked}</div>
        <p style="color:var(--muted);font-size:13px">${dish?.nameEn || ''}</p>
        ${state.grandparents[dk] && meal === 'dinner' ? '<span class="portion-badge" style="margin-top:8px;display:inline-block">+2 phần cho Ông Bà</span>' : ''}
        <button class="btn-outline" style="margin-top:12px" onclick="unlockMeal('${key}')">Chọn lại</button>
      </div>`;
    document.getElementById('suggestions-title').style.display = 'none';
    document.getElementById('food-suggestions').innerHTML = '';
    return;
  }

  document.getElementById('suggestions-title').style.display = '';

  // Voter avatars
  const avatarHtml = members.map(mid => {
    const m = DATA.members[mid];
    if (!m) return '';
    const isActive = state.activeMember === mid;
    const voteKey = `${key}`;
    const votes = state.votes[voteKey] || {};
    // Show vote indicator on avatar
    let indicator = '';
    // Count how many dishes this member has voted on
    const votedCount = Object.values(votes).filter(v => v[mid]).length;
    if (votedCount > 0) indicator = `<span class="vote-indicator">${votedCount}</span>`;

    return `<div class="voter-avatar ${isActive?'active':''}" onclick="setActiveVoter('${mid}')" title="${m.name}">
      ${m.icon}${indicator}
    </div>`;
  }).join('');

  // Consensus bar
  const votes = state.votes[key] || {};
  const totalDishes = Object.keys(votes).length;
  let bestDish = null, bestScore = -Infinity;
  Object.entries(votes).forEach(([dishId, dv]) => {
    let score = 0;
    members.forEach(mid => {
      if (dv[mid] === 'yes') score += 2;
      else if (dv[mid] === 'maybe') score += 1;
      else if (dv[mid] === 'no') score -= 1;
    });
    if (score > bestScore) { bestScore = score; bestDish = dishId; }
  });

  const maxScore = members.length * 2;
  const consensusPct = totalDishes > 0 ? Math.max(0, Math.round((bestScore / maxScore) * 100)) : 0;

  document.getElementById('voting-section').innerHTML = `
    <div class="voting-panel">
      <div class="voting-title">👨‍👩‍👧‍👦 Bỏ phiếu — Chọn người rồi vote trên thẻ món</div>
      <div class="voter-avatars">${avatarHtml}</div>
      <div class="consensus-bar"><div class="consensus-fill" style="width:${consensusPct}%"></div></div>
      <div class="consensus-text">${consensusPct > 0 ? `Đồng thuận: ${consensusPct}%` : 'Chạm avatar để bắt đầu bỏ phiếu'}</div>
      ${bestDish && consensusPct >= 80 ? `<button class="lock-btn" onclick="lockMeal('${key}','${bestDish}')">✅ Chốt: ${DATA.dishes.find(d=>d.id===bestDish)?.nameVi || bestDish}</button>` : ''}
      ${totalDishes > 0 && consensusPct < 80 && consensusPct > 0 ? `<button class="lock-btn" style="background:var(--amber)" onclick="lockMeal('${key}','${bestDish}')">🤝 Chọn thỏa hiệp: ${DATA.dishes.find(d=>d.id===bestDish)?.nameVi || bestDish}</button>` : ''}
    </div>`;
}

function setActiveVoter(mid) {
  state.activeMember = state.activeMember === mid ? null : mid;
  renderTodayView();
}

function castVote(key, dishId, vote) {
  if (!state.activeMember) return;
  if (!state.votes[key]) state.votes[key] = {};
  if (!state.votes[key][dishId]) state.votes[key][dishId] = {};
  state.votes[key][dishId][state.activeMember] = vote;
  saveState();

  // Check unanimous yes
  const date = state.selectedDate ? new Date(state.selectedDate) : new Date();
  const dk = dateKey(date);
  const meal = state.selectedMeal || 'dinner';
  const members = getMealMembers(date, meal);
  const dv = state.votes[key][dishId];
  const allYes = members.every(mid => dv[mid] === 'yes');

  if (allYes) {
    lockMeal(key, dishId);
    // Confetti!
    if (typeof confetti === 'function') {
      confetti({ particleCount:100, spread:70, origin:{y:0.6} });
    }
    return;
  }

  // Bounce animation on avatar
  const avatars = document.querySelectorAll('.voter-avatar');
  avatars.forEach(a => {
    if (a.classList.contains('active')) {
      a.style.animation = 'scaleBounce .3s ease';
      setTimeout(() => a.style.animation = '', 300);
    }
  });

  renderTodayView();
}

function lockMeal(key, dishId) {
  state.lockedMeals[key] = dishId;
  // Add to history
  const [dk, meal] = key.split('_');
  state.mealHistory.push({ date: dk, meal, dishId, timestamp: Date.now() });
  // Keep last 30 days
  const thirtyDays = 30 * 24 * 60 * 60 * 1000;
  state.mealHistory = state.mealHistory.filter(h => Date.now() - h.timestamp < thirtyDays);
  saveState();

  if (typeof confetti === 'function') {
    confetti({ particleCount:80, spread:60, origin:{y:0.6} });
  }

  renderTodayView();
  renderWeekGrid();
}

function unlockMeal(key) {
  delete state.lockedMeals[key];
  delete state.votes[key];
  saveState();
  renderTodayView();
  renderWeekGrid();
}

// Food type classification based on dish name, tags, and ingredients
function getFoodType(dish) {
  const name = (dish.nameVi + ' ' + dish.nameEn + ' ' + dish.id).toLowerCase();
  const tags = dish.tags || [];
  const types = [];
  if (name.match(/cơm|rice|risotto|biryani|bibimbap|donburi|omurice/)) types.push('rice');
  if (name.match(/phở|bún|mì|miến|cao lầu|hủ tiếu|bánh canh|bánh đa|noodle|pasta|spaghetti|udon|ramen|soba|pad thai|vermicelli|penne|fettuccine|gnocchi|lasagna/)) types.push('noodles');
  if (name.match(/pizza/)) types.push('pizza');
  if (name.match(/bò|gà|lợn|sườn|thịt|beef|chicken|pork|lamb|steak|burger|duck|vịt|chop/) || tags.includes('pork')) types.push('meat');
  if (name.match(/cá|tôm|mực|hải sản|nghêu|cua|fish|shrimp|seafood|sushi|sashimi|salmon|tuna|lobster|crab/) || tags.includes('fresh_seafood') || tags.includes('raw_seafood')) types.push('seafood');
  if (name.match(/rau|salad|vegetable|chay|tofu|đậu hũ|đậu phụ/) || tags.includes('vegetables') || tags.includes('fried_tofu')) types.push('vegetables');
  if (name.match(/canh|súp|soup|lẩu|hotpot|cháo|porridge|chowder/) || tags.includes('hotpot')) types.push('soup');
  if (name.match(/chiên|rán|fried|nem|spring roll|bánh|tempura|katsu|nugget|samosa/) || tags.includes('street')) types.push('fried');
  if (name.match(/curry|cà ri|masala|tikka/)) types.push('curry');
  if (name.match(/taco|burrito|wrap|quesadilla|nachos|sandwich|bánh mì|bread|croissant|pancake|waffle|crêpe|quiche/)) types.push('bread');
  return types.length ? types : ['other'];
}

  rice:{ icon:'🍚', vi:'Cơm / Rice', img:'rice' },
  noodles:{ icon:'🍜', vi:'Bún Mì / Noodles', img:'pasta' },
  pizza:{ icon:'🍕', vi:'Pizza', img:'pizza' },
  meat:{ icon:'🥩', vi:'Thịt / Meat', img:'burger' },
  seafood:{ icon:'🦐', vi:'Hải sản / Seafood', img:'rice' },
  vegetables:{ icon:'🥬', vi:'Rau Chay / Veggies', img:'dosa' },
  soup:{ icon:'🍲', vi:'Canh Lẩu / Soup', img:'biryani' },
  fried:{ icon:'🍤', vi:'Chiên Rán / Fried', img:'samosa' },
  curry:{ icon:'🍛', vi:'Cà Ri / Curry', img:'biryani' },
  bread:{ icon:'🥖', vi:'Bánh / Bread', img:'dessert' },

function renderDishCard(d, i, dk, meal, members, key) {
  const greyed = d.compat.avgPct < 50;
  const repeatWarn = d.repeat && d.repeat.isRecent;
  const overallClass = d.compat.avgPct >= 70 ? 'compat-high' : d.compat.avgPct >= 50 ? 'compat-med' : 'compat-low';

  const memberBars = members.map(mid => {
    const m = DATA.members[mid];
    const c = d.compat.members[mid];
    const icon = c?.status === 'like' ? '✅' : c?.status === 'soso' ? '🟡' : '❌';
    return `<div class="compat-member"><span class="member-icon">${m?.icon||''}</span><span>${icon}</span></div>`;
  }).join('');

  let conflictHtml = '';
  d.conflicts.forEach(c => {
    conflictHtml += `<span class="conflict-badge">${c.reason || `⚠️ ${c.member} không thích lắm`}</span>`;
  });

  let repeatHtml = '';
  if (d.repeat) repeatHtml = `<span class="repeat-badge">🔁 Đã ăn ${d.repeat.daysAgo} ngày trước</span>`;

  const spice = '🌶️'.repeat(d.spice);

  const votes = state.votes[key]?.[d.id] || {};
  let voteHtml = '';
  if (state.activeMember) {
    const myVote = votes[state.activeMember] || '';
    voteHtml = `<div class="vote-btns">
      <button class="vote-btn ${myVote==='yes'?'selected':''}" onclick="event.stopPropagation();castVote('${key}','${d.id}','yes')">✅</button>
      <button class="vote-btn ${myVote==='maybe'?'selected':''}" onclick="event.stopPropagation();castVote('${key}','${d.id}','maybe')">🟡</button>
      <button class="vote-btn ${myVote==='no'?'selected':''}" onclick="event.stopPropagation();castVote('${key}','${d.id}','no')">❌</button>
    </div>`;
  }

  let existingVotes = '';
  if (Object.keys(votes).length > 0) {
    existingVotes = '<div style="display:flex;gap:6px;margin-top:4px">' +
      Object.entries(votes).map(([mid, v]) => {
        const m = DATA.members[mid];
        const vIcon = v==='yes'?'✅':v==='maybe'?'🟡':'❌';
        return `<span style="font-size:12px">${m?.icon||''}${vIcon}</span>`;
      }).join('') + '</div>';
  }

  return `<div class="food-card ${greyed?'greyed':''} ${repeatWarn?'repeat-warn':''}"
    style="animation-delay:${i*50}ms" onclick="openDishModal('${d.id}','${dk}','${meal}')">
    <div class="food-card-img-wrap">
      <img class="food-card-img" src="${dishImage(d)}" alt="${d.nameVi}" loading="lazy"
        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%23E8DDD0%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%238B7355%22 font-size=%2240%22>🍽️</text></svg>'">
      <div class="food-card-overlay">
        <span class="cuisine-tag cuisine-${DATA.cuisineColors[d.cuisine]||'western'}">${DATA.cuisineLabels[d.cuisine]||d.cuisine}</span>
        <span class="compat-overall ${overallClass}">${d.compat.avgPct}%</span>
      </div>
    </div>
    <div class="food-card-body">
      <div class="food-card-name">${d.nameVi}</div>
      <div class="food-card-name-en">${d.nameEn}</div>
      <div class="compat-bar">${memberBars}</div>
      ${conflictHtml}
      ${repeatHtml}
      <div class="food-chips">
        ${spice ? `<span class="chip">${spice}</span>` : ''}
        <span class="chip">⏱️ ${d.time}</span>
        <span class="chip">💰 ${'₫'.repeat(d.price)}</span>

}

function renderFoodSuggestions(dk, meal, members) {
  const key = `${dk}_${meal}`;
  if (state.lockedMeals[key]) return;

  let allCandidates = DATA.dishes.filter(d => d.meal.includes(meal));

  // Build cuisine filter
  const cuisinesInMeal = [...new Set(allCandidates.map(d => d.cuisine))];
  const filterEl = document.getElementById('cuisine-filter');
  const activeCuisine = state.cuisineFilter || 'all';
  const activeType = state.foodTypeFilter || 'all';

  let cuisineHtml = `<button class="cuisine-pill ${activeCuisine==='all'?'active':''}" onclick="setCuisineFilter('all')">🍽️ Tất cả</button>`;
  cuisineHtml += cuisinesInMeal.map(c => {
    const label = DATA.cuisineLabels[c] || c;
    const flags = {vietnamese:'🇻🇳',japanese:'🇯🇵',korean:'🇰🇷',italian:'🇮🇹',french:'🇫🇷',indian:'🇮🇳',mexican:'🇲🇽',chinese:'🇨🇳',thai:'🇹🇭',street:'🛒',western:'🍔'};
    return `<button class="cuisine-pill ${activeCuisine===c?'active':''}" onclick="setCuisineFilter('${c}')">${flags[c]||'🍽️'} ${label}</button>`;
  }).join('');

  filterEl.innerHTML = `
    <div class="filter-row"><span class="filter-label">🌍 Quốc gia</span><div class="cuisine-filter">${cuisineHtml}</div></div>`;

  // Apply cuisine filter
  let filtered = activeCuisine === 'all' ? allCandidates : allCandidates.filter(d => d.cuisine === activeCuisine);

  // Score all candidates
  filtered = filtered.map(d => {
    const compat = calculateCompatibility(d, members);
    const conflicts = getConflicts(d, compat, members);
    const repeat = getRepeatInfo(d.id);
    return { ...d, compat, conflicts, repeat };
  });
  filtered.sort((a, b) => b.compat.avgPct - a.compat.avgPct);

  const container = document.getElementById('food-suggestions');

  // If a food type is selected, show dishes in that group
  if (activeType !== 'all') {
    const dishes = filtered.filter(d => getFoodType(d).includes(activeType));
    const info = foodTypeLabels[activeType] || { icon:'🍽️', vi:activeType };
    container.innerHTML =
      `<div class="group-header" onclick="setFoodTypeFilter('all')">
        <span class="group-back">← Quay lại</span>
        <span class="group-title">${info.icon} ${info.vi} (${dishes.length} món)</span>
      </div>` +
      `<div class="food-grid">${dishes.map((d, i) => renderDishCard(d, i, dk, meal, members, key)).join('')}</div>`;
    return;
  }

  // Group view: show food type group cards
  const groups = {};
  filtered.forEach(d => {
    getFoodType(d).forEach(t => {
      if (!groups[t]) groups[t] = [];
      groups[t].push(d);
    });
  });

  // Sort groups by number of dishes (biggest first), then by best compatibility
  const sortedGroups = Object.entries(groups).sort((a, b) => {
    if (b[1].length !== a[1].length) return b[1].length - a[1].length;
    return b[1][0].compat.avgPct - a[1][0].compat.avgPct;
  });

  container.innerHTML = `<div class="group-grid">${sortedGroups.map(([type, dishes]) => {
    const info = foodTypeLabels[type] || { icon:'🍽️', vi:type, img:'rice' };
    const topDish = dishes[0];
    const avgCompat = Math.round(dishes.reduce((s, d) => s + d.compat.avgPct, 0) / dishes.length);
    const compatClass = avgCompat >= 70 ? 'compat-high' : avgCompat >= 50 ? 'compat-med' : 'compat-low';
    const imgNum = (type.charCodeAt(0) % 10) + 1;
    const imgSrc = `https://foodish-api.com/images/${info.img}/${info.img}${imgNum}.jpg`;

    return `<div class="group-card" onclick="setFoodTypeFilter('${type}')">
      <div class="group-card-img">
        <img src="${imgSrc}" alt="${info.vi}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%23E8DDD0%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%238B7355%22 font-size=%2240%22>${info.icon}</text></svg>'">
        <div class="group-card-overlay">
          <span class="group-card-count">${dishes.length} món</span>
          <span class="compat-overall ${compatClass}">${avgCompat}%</span>
        </div>
      </div>
      <div class="group-card-body">
        <div class="group-card-name">${info.icon} ${info.vi}</div>
        <div class="group-card-preview">${dishes.slice(0,3).map(d => d.nameVi).join(', ')}${dishes.length > 3 ? '...' : ''}</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

}

function closeModal() {

}

function renderSearch() {
  renderSearchFilters();
  renderRestaurants();
}

let activeFilters = { cuisine: null, district: null, rating: null, price: null };

function renderSearchFilters() {
  const cuisines = Object.entries(DATA.cuisineLabels);
  const filters = [
    ...DATA.districts.map(d => ({ label:`🗺️ ${d}`, type:'district', value:d })),
    ...cuisines.map(([k,v]) => ({ label:`🍽️ ${v}`, type:'cuisine', value:k })),
    { label:'⭐ 4.0+', type:'rating', value:4.0 },
    { label:'⭐ 4.5+', type:'rating', value:4.5 },
    { label:'💰 ₫', type:'price', value:1 },
    { label:'💰 ₫₫', type:'price', value:2 },
    { label:'💰 ₫₫₫', type:'price', value:3 },
    { label:'🚗 Delivery', type:'delivery', value:true },
  ];

  document.getElementById('search-filters').innerHTML = filters.map(f => {
    const isActive = activeFilters[f.type] === f.value;
    return `<button class="filter-chip ${isActive?'active':''}"
      onclick="toggleFilter('${f.type}',${typeof f.value==='string'?`'${f.value}'`:f.value})">${f.label}</button>`;
  }).join('');
}

function toggleFilter(type, value) {
  activeFilters[type] = activeFilters[type] === value ? null : value;
  renderSearchFilters();
  renderRestaurants();
}

function renderRestaurants(query) {
  let restaurants = [...DATA.restaurants];

  // Apply filters
  if (activeFilters.cuisine) restaurants = restaurants.filter(r => r.cuisine === activeFilters.cuisine);
  if (activeFilters.district) restaurants = restaurants.filter(r => r.district === activeFilters.district);
  if (activeFilters.rating) restaurants = restaurants.filter(r => r.rating >= activeFilters.rating);
  if (activeFilters.price) restaurants = restaurants.filter(r => r.price === activeFilters.price);
  if (activeFilters.delivery) restaurants = restaurants.filter(r => r.delivery);

  // Text search
  if (query) {
    const q = query.toLowerCase();
    restaurants = restaurants.filter(r =>
      r.name.toLowerCase().includes(q) ||
      (DATA.cuisineLabels[r.cuisine]||'').toLowerCase().includes(q) ||
      r.district.toLowerCase().includes(q)
    );
  }

  // Calculate family compatibility for each restaurant
  const allMembers = ['dad','mom','son','daughter'];

  document.getElementById('search-results').innerHTML = restaurants.map((r, i) => {
    // Average compatibility of menu items
    const menuDishes = r.menu.map(id => DATA.dishes.find(d => d.id === id)).filter(Boolean);
    let avgCompat = 0;
    if (menuDishes.length > 0) {
      const total = menuDishes.reduce((sum, d) => sum + calculateCompatibility(d, allMembers).avgPct, 0);
      avgCompat = Math.round(total / menuDishes.length);
    }
    const compatClass = avgCompat >= 70 ? 'compat-high' : avgCompat >= 50 ? 'compat-med' : 'compat-low';

    return `<div class="rest-card" style="animation-delay:${i*50}ms" onclick="openRestaurantModal(${i})">
      <div class="rest-card-img-wrap">
        <img class="rest-card-img" src="${restImage(r)}" alt="${r.name}" loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect fill=%22%23E8DDD0%22 width=%22400%22 height=%22300%22/><text x=%22200%22 y=%22150%22 text-anchor=%22middle%22 fill=%22%238B7355%22 font-size=%2240%22>🏪</text></svg>'">
        <span class="rest-card-rating-badge">⭐ ${r.rating}</span>
      </div>
      <div class="rest-card-body">
        <div class="rest-card-name">${r.name}</div>
        <span class="cuisine-tag cuisine-${DATA.cuisineColors[r.cuisine]||'western'}" style="font-size:9px;padding:2px 6px">${DATA.cuisineLabels[r.cuisine]}</span>
        <div class="rest-card-meta">
          ${r.district} · ${'₫'.repeat(r.price)} ${r.delivery ? '· 🚗' : ''}
        </div>
        <span class="compat-overall ${compatClass}" style="font-size:10px;margin-top:4px;display:inline-block">👨‍👩‍👧‍👦 ${avgCompat}%</span>
      </div>
    </div>`;
  }).join('') || '<div class="empty-state"><div class="empty-icon">🔍</div><p>Không tìm thấy nhà hàng</p></div>';
}

function openRestaurantModal(idx) {
  let restaurants = [...DATA.restaurants];
  if (activeFilters.cuisine) restaurants = restaurants.filter(r => r.cuisine === activeFilters.cuisine);
  if (activeFilters.district) restaurants = restaurants.filter(r => r.district === activeFilters.district);
  if (activeFilters.rating) restaurants = restaurants.filter(r => r.rating >= activeFilters.rating);
  if (activeFilters.price) restaurants = restaurants.filter(r => r.price === activeFilters.price);
  if (activeFilters.delivery) restaurants = restaurants.filter(r => r.delivery);

  const r = restaurants[idx];
  if (!r) return;

  const allMembers = ['dad','mom','son','daughter'];
  const menuDishes = r.menu.map(id => DATA.dishes.find(d => d.id === id)).filter(Boolean);

  const menuHtml = menuDishes.map(d => {
    const compat = calculateCompatibility(d, allMembers);
    const overallClass = compat.avgPct >= 70 ? 'compat-high' : compat.avgPct >= 50 ? 'compat-med' : 'compat-low';
    const memberBars = allMembers.map(mid => {
      const m = DATA.members[mid];
      const c = compat.members[mid];
      const icon = c?.status==='like'?'✅':c?.status==='soso'?'🟡':'❌';
      return `<span style="font-size:12px">${m?.icon||''}${icon}</span>`;
    }).join(' ');

    const dk = state.selectedDate ? dateKey(new Date(state.selectedDate)) : dateKey(new Date());
    const meal = state.selectedMeal || 'dinner';
    const key = `${dk}_${meal}`;

    return `<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:12px;margin-bottom:8px">
      <img src="${dishImage(d)}" style="width:56px;height:56px;border-radius:10px;object-fit:cover"
        onerror="this.style.display='none'" loading="lazy">
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${d.nameVi}</div>
        <div style="font-size:11px;color:var(--muted)">${d.nameEn}</div>
        <div style="margin-top:4px">${memberBars} <span class="compat-overall ${overallClass}" style="font-size:10px">${compat.avgPct}%</span></div>
      </div>
      <button class="btn-primary" style="padding:8px 12px;font-size:11px" onclick="addToVote('${d.id}','${key}');closeModal()">+ Vote</button>
    </div>`;
  }).join('');

  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.name + ' ' + r.address + ' Hà Nội')}`;

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-handle"></div>
    <img class="modal-img" src="${restImage(r)}" alt="${r.name}"
      onerror="this.style.height='100px';this.style.background='var(--border)'">
    <div class="modal-header">
      <h2>${r.name}</h2>
      <p><span class="cuisine-tag cuisine-${DATA.cuisineColors[r.cuisine]||'western'}">${DATA.cuisineLabels[r.cuisine]}</span> ⭐ ${r.rating} · ${'₫'.repeat(r.price)}</p>
    </div>
    <div class="modal-body">
      <div class="detail-section">
        <p>📍 ${r.address}</p>
        ${r.phone ? `<p>📞 ${r.phone}</p>` : ''}
        <p>⏰ ${r.hours}</p>
        ${r.delivery ? '<p>🚗 Có giao hàng</p>' : ''}
        <a href="${mapsUrl}" target="_blank" rel="noopener" style="display:inline-block;margin-top:8px;color:var(--primary);font-weight:600;font-size:13px">📍 Mở Google Maps →</a>
      </div>
      <div class="detail-section">
        <h3>🍽️ Thực đơn</h3>
        ${menuHtml}
      </div>
    </div>`;

  document.getElementById('modal').classList.add('open');
}

// ═══════════════════════════════════════
// RENDER: HISTORY
// ═══════════════════════════════════════
function renderHistory() {
  const history = [...state.mealHistory].sort((a,b) => b.timestamp - a.timestamp);

  if (history.length === 0) {
    document.getElementById('history-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📜</div>
        <p>Chưa có lịch sử bữa ăn<br><span style="font-size:12px">No meal history yet</span></p>
      </div>`;
    return;
  }

  // Group by week
  const weeks = {};
  history.forEach(h => {
    const d = new Date(h.timestamp);
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const wk = dateKey(weekStart);
    if (!weeks[wk]) weeks[wk] = [];
    weeks[wk].push(h);
  });

  document.getElementById('history-list').innerHTML = Object.entries(weeks).map(([wk, items]) => {
    const weekDate = new Date(wk);
    return `<div class="history-week">
      <h3>Tuần ${weekDate.getDate()}/${weekDate.getMonth()+1}</h3>
      ${items.map(h => {
        const dish = DATA.dishes.find(d => d.id === h.dishId);
        const mealLabel = h.meal==='breakfast'?'Sáng':h.meal==='lunch'?'Trưa':'Tối';
        return `<div class="history-item">
          <img src="${dish ? dishImage(dish) : ''}" alt="" loading="lazy"
            onerror="this.style.display='none'">
          <div class="history-info">
            <div class="h-dish">${dish?.nameVi || h.dishId}</div>
            <div class="h-meta">${h.date} · ${mealLabel} · ${dish?.nameEn||''}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function switchView(view) {
  state.currentView = view;

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(`view-${view}`).classList.add('active');

  document.querySelectorAll('.nav-item').forEach((n, i) => {
    n.classList.toggle('active', ['schedule','today','search','history'][i] === view);
  });

  if (view === 'schedule') renderWeekGrid();
  else if (view === 'today') renderTodayView();
  else if (view === 'search') renderSearch();
  else if (view === 'history') renderHistory();
}

// ═══════════════════════════════════════
// SEARCH INPUT
// ═══════════════════════════════════════
document.getElementById('search-input').addEventListener('input', function(e) {
  renderRestaurants(e.target.value.trim());
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadState();

// Set today as default selected date
if (!state.selectedDate) {
  state.selectedDate = Date.now();
  state.selectedMeal = 'dinner';
}

renderMemberSelector();
renderWeekGrid();

// Swipe modal to close
let touchStartY = 0;
document.getElementById('modal-content').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
});
document.getElementById('modal-content').addEventListener('touchmove', e => {
  const diff = e.touches[0].clientY - touchStartY;
  if (diff > 80) closeModal();
});

</script>
